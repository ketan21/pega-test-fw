name: Pega Test Automation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1-5'  # Nightly at 2 AM UTC (Mon-Fri)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
        include:
          - browser: chromium
            label: Chrome
          - browser: firefox
            label: Firefox
          - browser: webkit
            label: Safari

    env:
      PEGA_BASE_URL: ${{ format('https://pega-{0}.example.com', matrix.env || 'qa') }}
      PEGA_ENV: ${{ matrix.env || 'qa' }}
      PEGA_USERNAME: ${{ secrets.PEGA_TEST_USER }}
      PEGA_PASSWORD: ${{ secrets.PEGA_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run API tests
        run: npx playwright test --grep '@api' --project=${{ matrix.browser }}
        env:
          PEGA_ENV: ${{ github.event.inputs.environment || 'qa' }}

      - name: Run smoke tests
        run: npx playwright test --grep '@smoke' --project=${{ matrix.browser }}
        env:
          PEGA_ENV: ${{ github.event.inputs.environment || 'qa' }}

      - name: Run UI tests
        run: npx playwright test --grep '@ui' --project=${{ matrix.browser }}
        env:
          PEGA_ENV: ${{ github.event.inputs.environment || 'qa' }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-${{ github.run_number }}
          path: ./reports/playwright/html/
          retention-days: 30

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}-${{ github.run_number }}
          path: ./reports/screenshots/
          retention-days: 30

  test-all-browsers:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      PEGA_ENV: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run full regression suite
        run: npx playwright test --grep '@regression' --project=${{ matrix.browser }}
        env:
          PEGA_ENV: ${{ github.event.inputs.environment || 'qa' }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report-${{ matrix.browser }}-${{ github.run_number }}
          path: ./reports/playwright/html/
          retention-days: 30
